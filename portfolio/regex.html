<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="font.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="regex.js" defer></script>

</head>
<body>
    <form>
        <label for="plate">Enter a random plate number:</label>
        <input id="plate" type="text" pattern="^[a-zA-Z]{3}-\d{3}$" required>
        <button type="submit">Submit</button><br><br>
        <label for="date">The date (DD.MM.YYYY):</label>
        <input id="date" type="text" pattern="^\d{1,2}.\d{1,2}\.\d{4}$" required>
        <button type="submit">Submit</button><br><br>
        <label for="identity">Enter Your Identity code:</label>
        <input id="identity" type="text" pattern="^\d{6}[-A]?\d{3}[A-Za-z0-9]$" required>
        <button type="submit">Submit</button><br><br>
        <label for="phone">Enter Your Phone Number:</label>
        <input id="phone" type="text" pattern="^\d{7,10}$" required>
        <button type="submit">Submit</button><br><br>
        <label for="html">Write a simple HTML code:</label>
        <input id="html" type="text" pattern="^&lt;.+&gt;.*&lt;/.+&gt;$" required>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
